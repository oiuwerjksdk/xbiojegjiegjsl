<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
  <div class="sub hide">ⓘ Дали ви е потребен термин?</div>
  <div class="name"></div>
  <div class="slots"></div>
</body>
<script>
const DIV_SUB = document.querySelector('.sub')
const DIV_NAME = document.querySelector('.name')
const DIV_SLOTS = document.querySelector('.slots')
const PARAMS = new URLSearchParams(window.location.search)
const PARAMS_ID = PARAMS.get('id')


fetch(`/slots?id=${PARAMS_ID}`, {
    signal: AbortSignal.timeout(4000)
  })
  .then(res => res.json())
  .then(data => {
    const slots = PARSE_DATA(data.timeslots)
    document.title = data.name
    RENDER(slots, data.name)
  })
  .catch(err => {
    document.body.innerHTML = '<div>Error - try refresh or return to homepage</div>'
    console.log(err)
  })


function PARSE_DATA(data) {
  let slots = {}
  let sortedSlots = {}
  let keys
  for (const property in data) {
    data[property].forEach(el => {
      let month = property.substr(0, 10).split('-')[1] //02
      let day = el.term.substr(8, 2) //27
      slots[`${month} ${day}`] = []
    })
    data[property].forEach(el => {
      let month = property.substr(0, 10).split('-')[1] //02
      let day = el.term.substr(8, 2) //27
      let slot = el.term.substr(11, 5) //08:20
      if (el.slotType == 0) {
        slot += 'a'
      } else if (el.slotType == 1) {
        slot += 'l'
      } else {
        slot += 't'
      }
      slots[`${month} ${day}`].push(slot)
    })
  }
  keys = Object.keys(slots).sort()
  keys.forEach(el => {
    sortedSlots[el] = slots[el]
  })
  return sortedSlots
}


function RENDER(slots, name) {
  const toRender = document.createElement('div')
  for (const property in slots) {
    const divDate = document.createElement('div')
    const divTitle = document.createElement('div')
    const divSlotContainer = document.createElement('div')
    const day = property.slice(3, 5)
    const month = property.slice(0, 2)
    divDate.classList.add('date')
    divTitle.classList.add('title')
    divSlotContainer.classList.add('slot-container')
    divTitle.textContent = `${FORMAT_DAY(day)} ${FORMAT_MONTH(month)}`
    slots[property].forEach(el => {
      const divSlot = document.createElement('div')
      divSlot.textContent = el.slice(0, 5)
      divSlot.classList.add('slot')
      el.includes('a') ? divSlot.classList.add('available') : 0
      el.includes('l') ? divSlot.classList.add('limited') : 0
      el.includes('t') ? divSlot.classList.add('taken') : 0
      divSlotContainer.append(divSlot)
    })
    divDate.append(divTitle)
    divDate.append(divSlotContainer)
    toRender.append(divDate)
  }
  DIV_NAME.innerText = name
  DIV_SLOTS.innerHTML = toRender.innerHTML
  if (!DIV_SLOTS.querySelectorAll('.available').length && !DIV_SLOTS.querySelectorAll('.limited').length) {
    DIV_SUB.classList.remove('hide')
  }
}


DIV_SUB.addEventListener('click', CLICK_SUB)

async function CLICK_SUB() {
  const email = prompt(`Внесете ваша е-маил адреса и ќе ви стигне порака штом има слободни термини:`)
  if (email == undefined) {
    return
  }
  if (!VALIDATE_EMAIL(email)) {
    alert('🚫 Грешка во адресата')
    return
  }
  try {
    const random = Math.random().toString().split('.')[1]
    const res = await fetch(`/sub?id=${PARAMS_ID}&email=${email}&code=${random}`, {
      signal: AbortSignal.timeout(4000)
    })
    const text = await res.text()
    if (text == 'ok') {
      alert('✅ Ќе ви стигне порака штом има нови термини.')
    } else {
      alert('❌ Неуспешно! Пробај повторно')
    }
  } catch (err) {
    console.log(err)
    alert('❌ Неуспешно! Пробај повторно')
  }
}


function VALIDATE_EMAIL(email) {
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return emailRegex.test(email)
}


function FORMAT_MONTH(number) {
  const months = ["Јануари", "Февруари", "Март", "Април", "Мај", "Јуни", "Јули", "Август", "Септември", "Октомври", "Ноември", "Декември"]
  return months[Number(number) - 1]
}


function FORMAT_DAY(number) {
  let day = number.indexOf('0') == 0 ? number.slice(1) : number
  if (day == 1 || day == 21 || day == 31) {
    day += 'ви'
  } else if (day == 2 || day == 22) {
    day += 'ри'
  } else if (day == 7 || day == 8 || day == 27 || day == 28) {
    day += 'ми'
  } else {
    day += 'ти'
  }
  return day
}
</script>
<style>
body {
  max-width: 800px;
  overflow-y: scroll;
  margin: auto;
  padding: .75rem;
  font-size: .9rem;
  font-family: arial;
  user-select: none;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
}

.sub {
  margin-bottom: .75rem;
  text-decoration: underline;
  cursor: pointer;
  color: green;
}

.slots {
  margin-top: .75rem;
}

.date {
  margin-bottom: 2rem;
  border: .1rem solid gray;
}

.date .title {
  padding: .2rem;
  background-color: gray;
  color: white;
  text-decoration: underline;
}

.slot {
  display: inline-block;
  width: 2.25rem;
  margin: .25rem;
  padding: .15rem;
  border-radius: .5rem;
  color: white;
  text-align: center;
}

.slot.available {
  background-color: #47a347;
}

.slot.limited {
  background-color: #d4bb00;
}

.slot.taken {
  background-color: #ff4242;
}

.hide {
  display: none;
}
</style>
